[tools]
actionlint = "latest"
hk = "latest"
pinact = "latest"
pkl = "latest"
ruff = "latest"
uv = "latest"
zizmor = "latest"
# Python is pinned in .python-version, which both mise and uv read natively
# (see [settings] below). pyproject.toml's requires-python remains the floor.

[settings]
# Make mise honour .python-version without relying on each user's global config.
idiomatic_version_file_enable_tools = ["python"]

[env]
# Wrap git hooks in `mise x` so hk, ruff and pytest are on PATH for everyone.
HK_MISE = "1"

[hooks]
postinstall = "hk install --mise"

[tasks.setup]
description = "Install Python dependencies"
run = "uv sync"

[tasks.lint]
description = "Lint with ruff"
run = "ruff check ."

[tasks.format]
description = "Format with ruff"
run = "ruff format ."

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.ci]
description = "Run everything CI runs: the same checks as the pre-commit hook"
depends = ["setup"]
run = "hk run check --all"

[tasks.pre-commit]
description = "Run the pre-commit hook manually"
run = "hk run pre-commit"
